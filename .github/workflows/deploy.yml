name: Deploy to VPS

on:
  push:
    branches:
      - main  # or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          # Test SSH connection
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "echo 'SSH connection successful'"
          
      - name: Update server packages
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "apt update && apt upgrade -y"
          
      - name: Deploy to VPS
        run: |
          # Ensure target directory exists and has correct permissions
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "mkdir -p /var/www/spends-fahrschule.ch && chmod -R 755 /var/www/spends-fahrschule.ch"
          
          # Deploy files
          rsync -avz --delete ./dist/ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/var/www/spends-fahrschule.ch/
          
      - name: Verify deployment and clear cache
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "
            echo '=== Checking deployed files ===' &&
            ls -lah /var/www/spends-fahrschule.ch/assets/ &&
            echo '' &&
            echo '=== Checking index.html ===' &&
            head -20 /var/www/spends-fahrschule.ch/index.html | grep -E '(index-|assets/)' &&
            echo '' &&
            echo '=== Verifying prices in JS file ===' &&
            JS_FILE=\$(ls /var/www/spends-fahrschule.ch/assets/index-*.js 2>/dev/null | head -1) &&
            if [ -f \"\$JS_FILE\" ]; then
              echo \"Checking file: \$JS_FILE\" &&
              grep -o 'CHF.*79.*Lektion\|CHF.*77.*Lektion' \"\$JS_FILE\" | head -2 || echo 'Prices not found in JS file!' &&
              grep -o '790\|1150' \"\$JS_FILE\" | head -2 || echo 'Package prices not found!'
            else
              echo 'ERROR: JS file not found!'
            fi &&
            echo '' &&
            echo '=== Clearing all caches ===' &&
            sudo rm -rf /var/cache/nginx/* &&
            sudo rm -rf /var/lib/nginx/cache/* &&
            echo '=== Setting proper cache headers ===' &&
            sudo sed -i '/location \/assets\//,/^[[:space:]]*}/ { /add_header Cache-Control/d; /expires/d; }' /etc/nginx/sites-available/spends-fahrschule.ch 2>/dev/null || true &&
            sudo sed -i '/location \/assets\//a\        add_header Cache-Control \"public, max-age=31536000, immutable\";' /etc/nginx/sites-available/spends-fahrschule.ch 2>/dev/null || true &&
            sudo sed -i '/location \//,/^[[:space:]]*}/ { /add_header Cache-Control/d; /expires/d; }' /etc/nginx/sites-available/spends-fahrschule.ch 2>/dev/null || true &&
            sudo sed -i '/location \//a\        add_header Cache-Control \"no-cache, no-store, must-revalidate\";' /etc/nginx/sites-available/spends-fahrschule.ch 2>/dev/null || true &&
            echo '=== Restarting Nginx ===' &&
            sudo nginx -t &&
            sudo systemctl reload nginx &&
            sudo systemctl restart nginx &&
            echo '=== Deployment complete! ==='" 